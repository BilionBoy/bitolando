      invalid: não é válido
      less_than: deve ser menor que %{count}
      less_than_or_equal_to: deve ser menor ou igual a %{count}
      model_invalid: "Validação falhou: %{errors}"
      not_a_number: não é um número
      not_an_integer: deve ser um número inteiro
      odd: deve ser ímpar
      other_than: deve ser diferente de %{count}
      present: deve ficar em branco
      required: é obrigatório(a)
      taken: já está em uso
      too_long:
        one: "é longo demais (máximo: 1 caractere)"
        other: "é longo demais (máximo: %{count} caracteres)"
      too_short:
        one: "é curto demais (mínimo: 1 caractere)"
        other: "é curto demais (mínimo: %{count} caracteres)"
      wrong_length:
        one: "não possui o tamanho esperado (1 caractere)"
        other: "não possui o tamanho esperado (%{count} caracteres)"
  helpers:
    select:
      prompt: Selecione...
    submit:
      create: Criar %{model}
      submit: Salvar %{model}
      update: Atualizar %{model}
  devise:
    confirmations:
      confirmed: Sua conta foi confirmada com sucesso.
      send_instructions: Em breve você receberá um e-mail com instruções para confirmação da sua conta.
    failure:
      already_authenticated: Você já está conectado.
      inactive: Sua conta ainda não foi ativada.
      invalid: "%{authentication_keys} ou senha inválidos."
      locked: Sua conta está bloqueada.
      last_attempt: "Você tem mais uma tentativa antes de sua conta ser bloqueada."
      not_found_in_database: "%{authentication_keys} ou senha inválidos."
      timeout: Sua sessão expirou. Por favor, entre novamente para continuar.
      unauthenticated: Você precisa entrar ou se registrar para continuar.
      unconfirmed: Você precisa confirmar sua conta antes de continuar.
    mailer:
      confirmation_instructions:
        subject: Instruções de confirmação
      reset_password_instructions:
        subject: Instruções para redefinição de senha
      unlock_instructions:
        subject: Instruções para desbloqueio
    omniauth_callbacks:
      failure: "Não foi possível autenticar você em %{kind} devido ao seguinte erro: \"%{reason}\"."
      success: "Autenticado com sucesso pela conta %{kind}."
    passwords:
      no_token: Você só pode acessar essa página a partir de um link de redefinição de senha. Se você acessou através desse link, certifique-se de que a URL está completa.
      send_instructions: Você receberá um e-mail com instruções para redefinição de sua senha em breve.
      updated: Sua senha foi alterada com sucesso. Você está conectado.
      updated_not_active: Sua senha foi alterada com sucesso.
    registrations:
      destroyed: Sua conta foi cancelada com sucesso.
      signed_up: Bem-vindo! Você se registrou com sucesso.
      signed_up_but_inactive: Você se registrou, mas ainda não pode entrar pois sua conta está inativa.
      signed_up_but_locked: Você se registrou, mas ainda não pode entrar pois sua conta está bloqueada.
      signed_up_but_unconfirmed: Uma mensagem com um link de confirmação foi enviada para o e-mail fornecido.
      update_needs_confirmation: Você atualizou sua conta, mas precisamos confirmar o seu novo e-mail. Por favor, verifique sua caixa de entrada.
      updated: Suas informações foram atualizadas com sucesso.
    sessions:
      signed_in: Conectado com sucesso.
      signed_out: Você saiu com sucesso.
      already_signed_out: Saiu com sucesso.
    unlocks:
      send_instructions: Você receberá um e-mail com instruções para desbloquear sua conta em breve.
      unlocked: Sua conta foi desbloqueada com sucesso. Por favor, entre para continuar.
